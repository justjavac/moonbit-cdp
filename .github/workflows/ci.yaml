name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v5

      - run: git config --global core.autocrlf false

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - uses: ilammy/msvc-dev-cmd@v1
        if: runner.os == 'Windows'

      - name: Use MSVC C compiler
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          "CC=cl" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Set up MoonBit
        if: runner.os != 'Windows'
        run: |
          for attempt in 1 2 3 4 5; do
            if curl -fsSL https://cli.moonbitlang.com/install/unix.sh -o /tmp/moonbit-install.sh; then
              bash /tmp/moonbit-install.sh
              break
            fi
            if [ "$attempt" = "5" ]; then
              exit 1
            fi
            sleep 10
          done
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"

      - name: Set up MoonBit
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          irm https://cli.moonbitlang.com/install/powershell.ps1 | iex
          "$env:USERPROFILE\.moon\bin" | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8

      - run: moon update
      - run: moon check --fmt
      - run: moon check --target all
      - run: moon info && git diff --exit-code
      - run: moon test
      - run: node tools/check_non_generated_coverage.mjs 100
